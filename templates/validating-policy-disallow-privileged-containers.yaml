{{- if .Values.validatingPolicyDisallowPrivilegedContainers.enabled }}
apiVersion: policies.kyverno.io/v1
kind: ValidatingPolicy
metadata:
  name: {{ .Values.validatingPolicyDisallowPrivilegedContainers.policyName }}
  # name: disallow-privileged-containers
  annotations:
    policies.kyverno.io/title: Disallow Privileged Containers in ValidatingPolicy
    policies.kyverno.io/category: Pod Security Standards (Baseline) in ValidatingPolicy
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/minversion: 1.14.0
    kyverno.io/kyverno-version: 1.14.0
    kyverno.io/kubernetes-version: 1.30+
    policies.kyverno.io/description: Privileged mode disables most security mechanisms and must not be allowed. This policy ensures Pods do not call for privileged mode.
spec:
  validationActions:
    {{- .Values.validatingPolicyDisallowPrivilegedContainers.validationActions | toYaml | nindent 4 }}
  evaluation:
    mode: Kubernetes
    {{- .Values.validatingPolicyDisallowPrivilegedContainers.evaluation | toYaml | nindent 4 }}
  matchConstraints:
    resourceRules:
      - apiGroups:
          - ""
        apiVersions:
          - v1
        operations:
          - CREATE
          - UPDATE
        resources:
          - pods
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: NotIn
          values:
            {{- range $namespaces := (concat .Values.systemNamespacesExclusion .Values.validatingPolicyDisallowPrivilegedContainers.excludedNamespaces .Values.validatingPolicyDisallowPrivilegedContainers.additionalExcludedNamespaces) | uniq }}
            - {{ . | quote }}
            {{- end }}
  variables:
    - name: allContainers
      expression: object.spec.containers +  object.spec.?initContainers.orValue([]) +  object.spec.?ephemeralContainers.orValue([])
  validations:
    - expression: variables.allContainers.all(container, container.?securityContext.?privileged.orValue(false) == false)
      message: Privileged mode is disallowed. All containers must set the securityContext.privileged field to `false` or unset the field.
{{- end }}