### Default Kyverno validating policies for Pod Security Admission (PSA) and other best practices.
### These are disabled by default, but can be enabled and customized as needed.
### We manage our own ClusterPolicies in templates/ instead of using the bundled ones, to allow for more customization (e.g. namespace exclusions).
validatingPolicyDisallowPrivilegedContainers:
  enabled: true
  policyName: disallow-privileged-containers
  validationActions:
    - Audit
  evaluation:
    admission:
      enabled: false
    background:
      enabled: false
  # Add any namespaces here that should be excluded from this specific policy, in addition to the system namespaces in systemNamespacesExclusion.namespaces.
  # This is useful for excluding namespaces that need privileged containers, such as those running certain CNI plugins or other infrastructure components.
  excludedNamespaces:
  - akuity
  - apigee
  - apigee-httpbin
