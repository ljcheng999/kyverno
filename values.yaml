global:
  image:
    registry: us-docker.pkg.dev/exa-cloud-utils/sre-docker
  imagePullSecrets:
    - name: regsecret
    - name: artifact-registry

kyverno:
  enabled: true
  crds:
    install: true
    customLabels:
      exa_product: ecp-inf
      exa_service: kyverno
    migration:
      podLabels:
        exa_product: ecp-inf
        exa_service: kyverno
      image:
        tag: v1.18.0
  config:
    webhookLabels:
      exa_product: ecp-inf
      exa_service: kyverno
  test:
    image:
      tag: v1.18.0

  webhooksCleanup:
    image:
      tag: v1.18.0
    podLabels:
      exa_product: ecp-inf
      exa_service: kyverno
  
  metricsConfig:
    namespaces:
      include: []
      exclude: []

    bucketBoundaries: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5, 5, 10, 15, 20, 25, 30]
    # -- (map) Configures the exposure of individual metrics, by default all metrics and all labels are exported, changing this configuration requires restart of the kyverno admission controller
    metricsExposure:
      # kyverno_policy_execution_duration_seconds: []
      # # bucketBoundaries: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5]
      # kyverno_admission_review_duration_seconds: []
      # kyverno_policy_rule_info_total:
      #   disabledLabelDimensions:
      #     - policy_namespace
      # kyverno_policy_results_total:
      #   disabledLabelDimensions:
      #     - policy_namespace
      # kyverno_admission_requests_total: []
      # kyverno_cleanup_controller_deletedobjects_total:
      #   disabledLabelDimensions:
      #     - policy_namespace

      ##########################################################################################

      # kyverno_policy_rule_info_total:
      #   disabledLabelDimensions:
      #     - policy_namespace
      # kyverno_policy_results:
      #   disabledLabelDimensions:
      #     - policy_namespace
      # kyverno_policy_results_total:
      #   disabledLabelDimensions:
      #     - policy_namespace
      # kyverno_policy_execution_duration_seconds:
      #   # bucketBoundaries: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5]
      #   disabledLabelDimensions: []
      kyverno_validating_policy_execution_duration_seconds:
        # bucketBoundaries: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5]
        disabledLabelDimensions:
          # - resource_namespace
          - resource_request_operation
      kyverno_mutating_policy_execution_duration_seconds:
        # bucketBoundaries: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5]
        disabledLabelDimensions:
          # - resource_namespace
          - resource_request_operation
      kyverno_generating_policy_execution_duration_seconds:
        # bucketBoundaries: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5]
        disabledLabelDimensions:
          # - resource_namespace
          - resource_request_operation
      kyverno_image_validating_policy_execution_duration_seconds:
        # bucketBoundaries: [0.005, 0.01, 0.025, 0.05, 0.1, 0.25, 0.5, 1, 2.5]
        disabledLabelDimensions:
          # - resource_namespace
          - resource_request_operation
      # kyverno_policy_changes_total:
      #   disabledLabelDimensions: []
      # kyverno_admission_requests_total:
      #   disabledLabelDimensions: []
      # kyverno_admission_review_duration_seconds:
      #   disabledLabelDimensions: []
      # kyverno_cleanup_controller_deletedobjects_total:
      #   disabledLabelDimensions:
      #     - policy_namespace
      # kyverno_deleting_controller_deletedobjects_total:
      #   disabledLabelDimensions: []
      ##########################################################################################
  features:
    logging:
      format: json
      verbosity: 2
    backgroundScan:
      enabled: true
      backgroundScanWorkers: 2
      backgroundScanInterval: 8h

  admissionController:
    autoscaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
    # admissionController has both an init container and a main container in the
    # upstream Kyverno subchart (v3.7.1). Top-level "resources" applies to the init
    # container; "container.resources" targets the main kyverno container.
    # The other controllers (background, cleanup, reports) have a single container,
    # so their "resources" block applies directly to it.
    container:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
    podLabels:
      exa_product: ecp-inf
      exa_service: kyverno
    labels:
      exa_product: ecp-inf
      exa_service: kyverno
    podDisruptionBudget:
      enabled: true
      minAvailable: 2
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: admission-controller
          topologyKey: kubernetes.io/hostname
    initContainer:
      image:
        tag: v1.18.0
    container:
      image:
        tag: v1.18.0
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: admission-controller
            app.kubernetes.io/instance: kyverno

  backgroundController:
    replicas: 2
    image:
      tag: v1.18.0
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    podLabels:
      exa_product: ecp-inf
      exa_service: kyverno
    labels:
      exa_product: ecp-inf
      exa_service: kyverno
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: background-controller
          topologyKey: kubernetes.io/hostname
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: background-controller
            app.kubernetes.io/instance: kyverno

  cleanupController:
    image:
      tag: v1.18.0
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 256Mi
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    podLabels:
      exa_product: ecp-inf
      exa_service: kyverno
    labels:
      exa_product: ecp-inf
      exa_service: kyverno
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: cleanup-controller
          topologyKey: kubernetes.io/hostname
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: cleanup-controller
            app.kubernetes.io/instance: kyverno

  reportsController:
    image:
      tag: v1.18.0
    replicas: 2
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        memory: 512Mi
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    podLabels:
      exa_product: ecp-inf
      exa_service: kyverno
    labels:
      exa_product: ecp-inf
      exa_service: kyverno
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              app.kubernetes.io/component: reports-controller
          topologyKey: kubernetes.io/hostname
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app.kubernetes.io/component: reports-controller
            app.kubernetes.io/instance: kyverno

kyverno-policies:
  enabled: false
  # Disabled: The bundled PSS restricted policies (disallow-*, require-*, restrict-*)
  # are not needed. We manage our own ClusterPolicies in templates/ instead.
  # policyKind: ClusterPolicy
  # policyType: ClusterPolicy
  # podSecurityStandard: restricted
  # podSecuritySeverity: high
  # validationFailureAction: Audit
  # failurePolicy: Ignore
  # validationAllowExistingViolations: true

systemNamespacesExclusion:
  # Kubernetes system
  - kube-system
  - kube-public
  - kube-node-lease
  # GKE managed
  - gke-managed-filestorecsi
  - gke-managed-networking-dra-driver
  - gke-managed-system
  - gke-managed-volumepopulator
  # Security / policy
  - gatekeeper-system
  - kyverno
  - upwind
  # Observability / monitoring
  - dynatrace
  - otel
  - monitoring
  - logs
  # Infrastructure / platform
  - windmill
  # Messaging
  - nats
  - nats-io
  - nats-sts
  # Traffic routing
  - istio-system

